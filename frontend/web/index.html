<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nukhba Elite — HUD Initializing...</title>
  <meta name="description" content="Nukhba Elite Recruitment — the world's most sophisticated talent intelligence platform. Sign in or create your elite account." />
  <link rel="stylesheet" href="/web/css/style.css" />
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }
    body { display: flex; align-items: center; justify-content: center; }

    /* Moving matrix data stream in the back */
    .data-stream {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(212,175,55,0.02) 50%, transparent 100%);
      background-size: 100% 200%;
      animation: scanline 8s linear infinite;
      z-index: -1; pointer-events: none;
    }
    @keyframes scanline { 0% { background-position: 0% -100%; } 100% { background-position: 0% 200%; } }

    /* Overlays */
    .viewport-container {
      display: flex;
      width: 100%; height: 100vh;
      max-width: 1800px;
      position: relative;
    }

    /* ─── LEFT PANEL (Holographic Core) ─── */
    .split-left {
      flex: 1.2;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
      z-index: 2;
    }
    .brand-arabic {
      font-family: 'Amiri', serif;
      font-size: 6rem;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px var(--gold-glow);
      animation: glitchIn 1.2s ease forwards;
    }
    .brand-en {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text);
      letter-spacing: 8px;
      text-transform: uppercase;
      margin: 10px 0 30px;
      opacity: 0;
      animation: fadeUp 1s 0.3s ease forwards;
    }
    .left-divider {
      width: 60px; height: 1px;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
      margin-bottom: 40px;
      transform: scaleX(0); transform-origin: left;
      animation: growLine 0.8s 0.6s ease forwards;
    }

    /* Floating Stats HUD */
    .stats-hud {
      display: flex;
      gap: 30px;
      opacity: 0;
      animation: fadeUp 1s 0.8s ease forwards;
    }
    .stat-box {
      background: rgba(10,10,12,0.6);
      backdrop-filter: blur(10px);
      border-left: 2px solid var(--gold);
      padding: 16px 20px;
      border-radius: 0 8px 8px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }
    .stat-box::before { content: ''; position: absolute; top:0; right:0; width:10px; height:1px; background: rgba(255,255,255,0.2); }
    .stat-box::after  { content: ''; position: absolute; bottom:0; right:0; width:10px; height:1px; background: rgba(255,255,255,0.2); }

    .stat-num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 700; color: var(--gold-light); }
    .stat-lbl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

    /* ─── RIGHT PANEL (Auth Pod) ─── */
    .split-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }
    
    .auth-pod {
      width: 100%;
      max-width: 480px;
      background: rgba(13,13,16,0.5);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(255,255,255,0.15);
      border-left: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 48px;
      box-shadow: var(--shadow), inset 0 0 60px rgba(0,0,0,0.5);
      position: relative;
      opacity: 0; transform: translateY(30px) scale(0.98);
      animation: podEnter 1s 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .auth-pod::before { /* Corner accent */
      content:''; position:absolute; top: -1px; left: 40px; width: 60px; height: 1px; background: var(--gold); box-shadow: 0 0 10px var(--gold);
    }
    .auth-pod::after { /* Corner accent */
      content:''; position:absolute; bottom: -1px; right: 40px; width: 60px; height: 1px; background: var(--gold); box-shadow: 0 0 10px var(--gold);
    }

    .form-header { margin-bottom: 30px; text-align: center; }
    .form-title    { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .form-desc     { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

    /* Futuristic Tab Bar */
    .tab-bar {
      display: flex;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 30px;
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; border-radius: 10px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); transition: all var(--transition); user-select: none;
    }
    .tab.active {
      background: rgba(212,175,55,0.15);
      color: var(--gold-light);
      box-shadow: 0 0 15px var(--gold-glow);
      border: 1px solid rgba(212,175,55,0.3);
    }

    /* Google button container */
    .google-btn-container { width: 100%; display: flex; justify-content: center; min-height: 44px; margin-bottom: 4px; }
    
    .or-divider {
      display: none; align-items: center; gap: 14px; margin: 20px 0;
      color: var(--text-muted); font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
    }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .pwd-wrap { position: relative; }
    .pwd-toggle { position: absolute; right: 14px; top: 18px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: color var(--transition); }
    .pwd-toggle:hover { color: var(--gold); filter: drop-shadow(0 0 8px var(--gold)); }

    /* Strength bar HUD style */
    .strength-bar { display: flex; gap: 4px; margin-top: 8px; }
    .strength-seg { flex: 1; height: 2px; background: var(--border); transition: background 0.3s, box-shadow 0.3s; }
    .strength-text { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); margin-top: 6px; text-align: right; text-transform: uppercase; }

    /* 2-col grid */
    .form-cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes growLine { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes podEnter { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes glitchIn {
      0% { opacity:0; transform: translateX(-10px); }
      20% { opacity:1; transform: translateX(5px); }
      40% { opacity:0.8; transform: translateX(-2px); }
      100% { opacity:1; transform: translateX(0); }
    }
    .panel-enter { animation: fadeUp 0.4s ease forwards; }

    /* Matrix Loader Overlay */
    #page-loader {
      position: fixed; inset: 0; background: var(--obsidian);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 30px; transition: opacity 0.8s;
    }
    .loader-ring {
      width: 120px; height: 120px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 50%;
      border-top: 2px solid var(--gold);
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }
    .loader-text {
      font-family: var(--font-mono); font-size: 0.8rem; color: var(--gold);
      letter-spacing: 4px; text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; text-shadow: 0 0 10px var(--gold); } 50% { opacity: 0.4; } }

    @media (max-width: 900px) {
      .split-left  { display: none; }
      .viewport-container { padding: 20px; }
      body { overflow: auto; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- MATRIX DATA STREAM BG -->
<div class="data-stream"></div>

<!-- PAGE LOADER: INITIALIZING HUD -->
<div id="page-loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Nukhba Elite...</div>
</div>

<div class="viewport-container">
  <!-- ═══ LEFT PANEL ═══ -->
  <div class="split-left">
    <div class="brand-arabic">نخبة</div>
    <div class="brand-en">Recruitment Platform // Elite Intelligence</div>
    <div class="left-divider"></div>

    <div class="stats-hud">
      <div class="stat-box">
        <div class="stat-num">12,045</div>
        <div class="stat-lbl">Processed Profiles</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">98.2%</div>
        <div class="stat-lbl">AI Match Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">72hr</div>
        <div class="stat-lbl">Average Placement</div>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT PANEL (POD) ═══ -->
  <div class="split-right">
    
    <div class="auth-pod">
      <div class="form-header" id="form-title-area">
        <div class="form-title">Login</div>
        <div class="form-desc text-dim">Secure Access // Nukhba Elite</div>
      </div>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <div class="tab active" id="tab-signin"   onclick="switchTab('signin')">Sign In</div>
        <div class="tab"        id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- ── SIGN IN PANEL ── -->
      <div id="panel-signin" class="panel-enter">
        <div class="google-btn-container" id="google-signin-btn"></div>
        <div class="or-divider">SYS_OVERRIDE // EMAIL</div>

        <div class="form-group">
          <label>Identity (Email)</label>
          <input type="email" id="login-email" placeholder="agent@nukhba.elite" autocomplete="email" />
        </div>

        <div class="form-group">
          <label>Clearance Code (Password)</label>
          <div class="pwd-wrap">
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="pwd-toggle" onclick="togglePwd('login-password',this)" title="Decrypt">👁</button>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:24px">
          <span style="font-size:.7rem;font-family:var(--font-mono);color:var(--gold);cursor:pointer;text-transform:uppercase"
                onclick="showToast('Initiating reset protocol... contact system admin','info')">Lost Clearance?</span>
        </div>

        <button class="btn btn-primary w-full" id="btn-login" onclick="doLogin()">
          Login <span style="font-family:var(--font-mono)">_&gt;</span>
        </button>
      </div>

      <!-- ── REGISTER PANEL ── -->
      <div id="panel-register" class="hidden panel-enter">
        <div class="google-btn-container" id="google-register-btn"></div>
        <div class="or-divider">NEW_NODE // EMAIL</div>

        <div class="form-cols-2">
          <div class="form-group">
            <label>Designation (Name)</label>
            <input type="text" id="reg-name" placeholder="John_Doe" autocomplete="name" />
          </div>
          <div class="form-group">
            <label>Access Level</label>
            <select id="reg-role">
              <option value="Candidate">Candidate</option>
              <option value="HR">HR Command</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Identity (Email)</label>
          <input type="email" id="reg-email" placeholder="john@domain.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label>Clearance Key (Password)</label>
          <div class="pwd-wrap">
            <input type="password" id="reg-password" placeholder="Generate key..."
                   oninput="updateStrength(this.value)" autocomplete="new-password" />
            <button class="pwd-toggle" onclick="togglePwd('reg-password',this)">👁</button>
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div><div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div><div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-text" id="strength-label">AWAITING_INPUT</div>
        </div>

        <button class="btn btn-primary w-full" id="btn-register" onclick="doRegister()">
          Create Account <span style="font-family:var(--font-mono)">_&gt;</span>
        </button>
      </div>
    </div><!-- end auth-pod -->

  </div>
</div>

<div id="toast-container"></div>
<script src="/web/js/app.js"></script>
<script>
  window.addEventListener('load', () => {
    setTimeout(() => {
      const loader = document.getElementById('page-loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 800);
      document.title = "Nukhba Elite — HUD Active";
    }, 1200);
  });

  const _me = session.get();
  if (_me) redirectByRole(_me);

  function redirectByRole(u) {
    if (u.role === 'HR' || u.role === 'Admin') window.location.href = '/web/pages/hr.html';
    else window.location.href = '/web/pages/candidate.html';
  }

  function switchTab(tab) {
    const s = document.getElementById('panel-signin'), r = document.getElementById('panel-register');
    const ts = document.getElementById('tab-signin'), tr = document.getElementById('tab-register');
    const title = document.getElementById('form-title-area');

    s.classList.toggle('hidden', tab !== 'signin');
    r.classList.toggle('hidden', tab !== 'register');
    ts.classList.toggle('active', tab === 'signin');
    tr.classList.toggle('active', tab === 'register');

    if (tab === 'signin') {
      title.innerHTML = '<div class="form-title">Login</div><div class="form-desc text-dim">Secure Access // Nukhba Elite</div>';
    } else {
      title.innerHTML = '<div class="form-title">New Profile</div><div class="form-desc text-dim">REGISTER_NODE // DATABASE</div>';
      r.classList.add('panel-enter');
    }
  }

  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    btn.style.color = inp.type === 'text' ? 'var(--gold)' : 'var(--text-dim)';
  }

  function updateStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ['var(--danger)','#ff9900','var(--gold)','var(--success)'];
    const glows  = [
      '0 0 8px rgba(255,51,102,0.5)', 
      '0 0 8px rgba(255,153,0,0.5)', 
      '0 0 8px rgba(212,175,55,0.5)', 
      '0 0 8px rgba(0,255,153,0.5)'
    ];
    const labels = ['COMPROMISED','SUB-OPTIMAL','ACCEPTABLE','SECURE'];

    for (let i = 1; i <= 4; i++) {
       const seg = document.getElementById('s'+i);
       if (i <= score) {
         seg.style.background = colors[score-1];
         seg.style.boxShadow = glows[score-1];
       } else {
         seg.style.background = 'var(--border)';
         seg.style.boxShadow = 'none';
       }
    }
    const lbl = document.getElementById('strength-label');
    lbl.textContent = val.length ? `STATUS: ${labels[score-1]||''}` : 'AWAITING_INPUT';
    lbl.style.color = score ? colors[score-1] : 'var(--text-muted)';
  }

  async function doLogin() {
    const btn = document.getElementById('btn-login');
    const email = document.getElementById('login-email').value.trim();
    const pwd = document.getElementById('login-password').value;
    if (!email || !pwd) return showToast('ERR: Missing parameters', 'error');

    setLoading(btn, true);
    try {
      const user = await api('POST', '/users/login', { email, password: pwd });
      session.set(user);
      showToast(`ACCESS GRANTED. Welcome Agent ${user.name}.`, 'success');
      setTimeout(() => redirectByRole(user), 1000);
    } catch(e) {
      showToast('ACCESS DENIED: ' + (e.message || 'Invalid credentials'), 'error');
    } finally { setLoading(btn, false); }
  }

  async function doRegister() {
    const btn = document.getElementById('btn-register');
    const name = document.getElementById('reg-name').value.trim();
    const role = document.getElementById('reg-role').value;
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!name||!email||!password) return showToast('ERR: Incomplete transmission', 'error');
    if (password.length < 6) return showToast('ERR: Key length insufficient', 'error');

    setLoading(btn, true);
    try {
      const user = await api('POST', '/users/register', { name, email, password, role });
      session.set(user);
      showToast('NODE CREATED. Synchronizing...', 'success');
      setTimeout(() => redirectByRole(user), 1000);
    } catch(e) { showToast('ERR: '+(e.message||'Registration failed'), 'error');
    } finally { setLoading(btn, false); }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
       if (!document.getElementById('panel-signin').classList.contains('hidden')) doLogin();
       else doRegister();
    }
  });
</script>
</body>
</html>
